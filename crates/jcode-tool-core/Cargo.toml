[package]
name = "jcode-tool-core"
version = "0.1.0"
edition = "2024"

[lib]
name = "jcode_tool_core"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
jcode-agent-runtime = { path = "../jcode-agent-runtime" }
jcode-message-types = { path = "../jcode-message-types" }
jcode-tool-types = { path = "../jcode-tool-types" }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }

[lints]
workspace = true
